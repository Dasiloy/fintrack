# =============================================================================
# FinTrack — Render Blueprint (Updated: Turbo Handles DB Gen)
#
# rootDir for monorepo isolation.
# buildCommand simplified: pnpm turbo build auto-runs db:generate via turbo.json deps.
# Assumes turbo.json has "build": {"dependsOn": ["^db:generate"]}.
# =============================================================================

services:
  # ── Public HTTP service: API Gateway ────────────────────────────────────────
  - type: web
    name: fintrack-api-gateway
    runtime: node
    rootDir: apps/api_gateway
    buildCommand: >-
      pnpm install --prod=false &&
      pnpm turbo build
    startCommand: node dist/main.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: MICROSERVICE_NAME
        value: API_GATEWAY
      - key: API_GATEWAY_HOST
        value: 0.0.0.0
      - key: API_GATEWAY_PORT
        value: 4001

      # Internal hostnames (verify post-deploy)
      - key: AUTH_SERVICE_HOST
        value: fintrack-auth-service
      - key: AUTH_SERVICE_PORT
        value: 4002
      - key: NOTIFICATION_SERVICE_HOST
        value: fintrack-notification-service
      - key: NOTIFICATION_SERVICE_PORT
        value: 4009
      - key: PAYMENT_SERVICE_HOST
        value: fintrack-payment-service
      - key: PAYMENT_SERVICE_PORT
        value: 4008

      # Secrets
      - key: DATABASE_URL
        sync: false
      - key: SWAGGER_DOC_USER
        sync: false
      - key: SWAGGER_DOC_PASS
        sync: false

  # ── Private gRPC service: Auth ──────────────────────────────────────────────
  - type: pserv
    name: fintrack-auth-service
    runtime: node
    rootDir: apps/auth_service
    buildCommand: >-
      pnpm install --prod=false &&
      pnpm turbo build
    startCommand: node dist/main.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: MICROSERVICE_NAME
        value: AUTH_SERVICE
      - key: AUTH_SERVICE_HOST
        value: 0.0.0.0
      - key: AUTH_SERVICE_PORT
        value: 4002

      # Token defaults
      - key: JWT_ACCESS_TOKEN_EXPIRATION
        value: 1h
      - key: JWT_REFRESH_TOKEN_EXPIRATION
        value: 1d
      - key: JWT_OTP_TOKEN_EXPIRATION
        value: 30m
      - key: JWT_2FA_TOKEN_EXPIRATION
        value: 5m
      - key: OTP_EXPIRY_MINUTES
        value: 5
      - key: MAX_LOGIN_ATTEMPTS
        value: 3

      # Secrets
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_OTP_SECRET
        sync: false
      - key: JWT_2FA_SECRET
        sync: false
      - key: AES_KEY
        sync: false
      - key: AUTH_GOOGLE_ID
        sync: false
      - key: AUTH_GOOGLE_SECRET
        sync: false
      - key: CLOUDINARY_ID
        sync: false

  # ── Private gRPC service: Notification ─────────────────────────────────────
  - type: pserv
    name: fintrack-notification-service
    runtime: node
    rootDir: apps/notification_service
    buildCommand: >-
      pnpm install --prod=false &&
      pnpm turbo build
    startCommand: node dist/main.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: MICROSERVICE_NAME
        value: NOTIFICATION_SERVICE
      - key: NOTIFICATION_SERVICE_HOST
        value: 0.0.0.0
      - key: NOTIFICATION_SERVICE_PORT
        value: 4009

      # Secrets
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: MAIL_FROM
        sync: false
      - key: MAIL_TOKEN
        sync: false

  # ── Private gRPC service: Payment ──────────────────────────────────────────
  - type: pserv
    name: fintrack-payment-service
    runtime: node
    rootDir: apps/payment_service
    buildCommand: >-
      pnpm install --prod=false &&
      pnpm turbo build
    startCommand: node dist/main.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: MICROSERVICE_NAME
        value: PAYMENT_SERVICE
      - key: PAYMENT_SERVICE_HOST
        value: 0.0.0.0
      - key: PAYMENT_SERVICE_PORT
        value: 4008

      # Secrets
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
