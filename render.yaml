# =============================================================================
# FinTrack — Render Blueprint
#
# Defines all 4 backend services for Render's native Node.js runtime.
# Link this repo in Render (New → Blueprint) and Render provisions everything.
#
# IMPORTANT: Do NOT use rootDir for monorepo services. Build commands must run
# from the monorepo root so pnpm can install all workspace packages and apply
# the .npmrc hoisting rules correctly.
#
# Non-secret env vars are defined here with `value:`.
# Secrets use `sync: false` — Render creates the slot but you fill the value
# once in the Render dashboard after the first deploy.
# Render env vars are available during the build step, so prisma generate
# will resolve DATABASE_URL correctly once you set it in the dashboard.
#
# See docs/RENDER.md for the full setup guide.
# =============================================================================

services:
  # ── Public HTTP service: API Gateway ────────────────────────────────────────
  - type: web
    name: fintrack-api-gateway
    runtime: node
    buildCommand: >-
      pnpm install --frozen-lockfile --prod=false &&
      pnpm turbo build --filter=api_gateway
    startCommand: cd apps/api_gateway && node dist/main.js
    buildFilter:
      paths:
        - apps/api_gateway/**
        - packages/common/**
        - packages/database/**
        - packages/utils/**
        - packages/types/**
        - render.yaml
        - pnpm-lock.yaml
        - turbo.json
        - .npmrc
    envVars:
      - key: NODE_ENV
        value: production
      - key: MICROSERVICE_NAME
        value: API_GATEWAY
      - key: API_GATEWAY_HOST
        value: 0.0.0.0
      - key: API_GATEWAY_PORT
        value: 4001

      # Internal hostnames for the private gRPC services (Render private DNS).
      # After first deploy confirm these match each service's Internal Address
      # in Render → <service> → Settings → Internal Address.
      - key: AUTH_SERVICE_HOST
        value: fintrack-auth-service
      - key: AUTH_SERVICE_PORT
        value: 4002
      - key: FINANCE_SERVICE_HOST
        value: fintrack-finance-service
      - key: FINANCE_SERVICE_PORT
        value: 4003
      - key: AI_SERVICE_HOST
        value: fintrack-ai-service
      - key: AI_SERVICE_PORT
        value: 4004
      - key: PAYMENT_SERVICE_HOST
        value: fintrack-payment-service
      - key: PAYMENT_SERVICE_PORT
        value: 4005
      - key: SCHEDULER_SERVICE_HOST
        value: fintrack-scheduler-service
      - key: SCHEDULER_SERVICE_PORT
        value: 4006
      - key: NOTIFICATION_SERVICE_HOST
        value: fintrack-notification-service
      - key: NOTIFICATION_SERVICE_PORT
        value: 4007

      # Secrets — set in Render → fintrack-api-gateway → Settings → Environment
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_CA_CERTIFICATE
        sync: false
      - key: REDIS_URL
        sync: false
      - key: AUTH_GOOGLE_ID
        sync: false
      - key: AUTH_GOOGLE_SECRET
        sync: false
      - key: SWAGGER_DOC_USER
        sync: false
      - key: SWAGGER_DOC_PASS
        sync: false
      - key: CLOUDINARY_URL
        sync: false
      - key: CLOUDINARY_SIGNATURE_EXPIRATION
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false


  # ── Private gRPC service: Auth ──────────────────────────────────────────────
  - type: pserv
    name: fintrack-auth-service
    runtime: node
    buildCommand: >-
      pnpm install --frozen-lockfile --prod=false &&
      pnpm turbo build --filter=auth_service
    startCommand: cd apps/auth_service && node dist/main.js
    buildFilter:
      paths:
        - apps/auth_service/**
        - packages/common/**
        - packages/database/**
        - packages/utils/**
        - packages/types/**
        - render.yaml
        - pnpm-lock.yaml
        - turbo.json
        - .npmrc
    envVars:
      - key: NODE_ENV
        value: production
      - key: MICROSERVICE_NAME
        value: AUTH_SERVICE
      - key: AUTH_SERVICE_HOST
        value: 0.0.0.0
      - key: AUTH_SERVICE_PORT
        value: 4002
      - key: JWT_OTP_TOKEN_EXPIRATION
        value: 30m
      - key: JWT_2FA_TOKEN_EXPIRATION
        value: 5m
      - key: OTP_EXPIRY_MINUTES
        value: 5
      - key: MAX_LOGIN_ATTEMPTS
        value: 3

      # Secrets — set in Render → fintrack-auth-service → Settings → Environment
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_CA_CERTIFICATE
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_OTP_SECRET
        sync: false
      - key: JWT_2FA_SECRET
        sync: false
      - key: AES_KEY
        sync: false


