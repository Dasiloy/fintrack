syntax= "proto3";

package payment;

service PaymentService {
   rpc CreateCheckoutSession(OriginUrlReq) returns (CreateCheckoutSessionResponse) {}
   rpc CreatePortalSession(OriginUrlReq) returns (CreatePortalSessionResponse) {}
}


message Empty {}

message OriginUrlReq {
  string origin_url =1;
}

message CreateCheckoutSessionResponse {
    string checkout_session_url= 1;
}


message CreatePortalSessionResponse {
    string portal_session_url= 1;
}

