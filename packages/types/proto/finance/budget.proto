syntax = "proto3";

package finance;

service BudgetService {
    rpc CreateBudget(CreateBudgetReq) returns (CreateBudgetRes) {}
}

message CreateBudgetReq {
    string name = 1;
    string description = 2;
    string amount = 3;
    string frequency = 4;
}

message CreateBudgetRes {
    string id = 1;
    string name = 2;
    string description = 3;
    string amount = 4;
    string frequency = 5;
}
