syntax = "proto3";
package finance;

import "finance/transaction.proto";

message Budget {
  string id = 1;
  string name = 2;
  float amount = 3;
  string description = 4;
  string period = 5;
  bool carry_over = 6;
  float alert_threshold = 7;
  Category category = 8;
  string created_at = 9;
  string updated_at = 10;
}

message CreateBudgetReq {
  string name = 1;
  float amount = 2;
  optional string description = 3;
  optional float alert_threshold = 4;
  string category_slug = 5;
  optional int32 month = 6;
  optional int32 year = 7;
  optional string period = 8;
}

message UpdateBudgetReq {
          string id = 1;
 optional string name = 2;
 optional float amount = 3;
 optional string description = 4;
optional  float alert_threshold = 5;
}

message DeleteBudgetReq {
  string id = 1;
}
