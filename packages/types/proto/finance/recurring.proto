syntax = "proto3";

package finance;

import "finance/transaction.proto";

message Recurinrg {
  string  id =1;
  string name =2;
  float amount =3;
  string type =4;
  string frequency=5;
  string start_date=6;
  optional string end_date=7;
  optional string description=8;
  optional string notes=9;
  optional string merchant=10;
  optional string  last_run_at=11;
  optional string  next_run_at=12;
  bool is_active =13;
  Category category=14;
  string   created_at= 15;
  string   updated_at= 16;
  repeated Transaction transactions=17;
}

message CreateRecurringReq {
    string name = 1;
    float amount = 2;
    string frequency = 3;
    string type = 4;
    string start_date = 5;
    string category_slug = 6;
    optional string end_date =7;
    optional  string description = 8;
    optional  string merchant = 9;
}


message UpdateRecurringReq {
  optional  string name = 1;
  optional  float amount = 2;
  optional  string frequency = 3;
  optional string end_date =4;
  optional  string description = 5;
  optional  string merchant = 6;
  string id= 7;
}

message GetRecurringsReq {
  optional bool is_active = 1;
}

message GetRecurringsRes {
  repeated Recurinrg recurrings = 1;
}

message RecurringReq  { // handle get by id, delete and toggle
  string id = 1;
}

