// finance/finance.proto
syntax = "proto3";
package finance;

import "finance/transaction.proto";
import "finance/budget.proto";
import "finance/recurring.proto";
// import "finance/split.proto";
// import "finance/goal.proto";

service FinanceService {
  // Transactions
    rpc CreateTransaction(CreateTransactionReq) returns (Transaction) {}
    rpc GetTransactions(GetTransactionsReq) returns (GetTransactionsRes) {}
    rpc GetTransaction(GetTransactionReq) returns (Transaction) {}
    rpc UpdateTransaction(UpdateTransactionReq) returns (Transaction) {}
    rpc DeleteTransaction(DeleteTransactionReq) returns (Empty) {}

  // Budgets
   rpc CreateBudget (CreateBudgetReq) returns (Budget) {}
   rpc UpdateBudget (UpdateBudgetReq) returns (Budget) {}
   rpc DeleteBudget (DeleteBudgetReq) returns (Empty) {}

  // Recurring
  rpc CreateRecurring(CreateRecurringReq)     returns (Recurinrg) {}
  rpc GetRecurrings(GetRecurringsReq)  returns (GetRecurringsRes) {}
  rpc GetRecurring(RecurringReq)       returns (Recurinrg) {}
  rpc UpdateRecurring(UpdateRecurringReq)     returns (Recurinrg) {}
  rpc ToggleRecurring(RecurringReq)     returns (Recurinrg) {}
  rpc DeleteRecurring(RecurringReq)     returns (Empty) {}

  // Splits
  // rpc CreateSplit(CreateSplitReq)             returns (Split) {}
  // rpc GetSplits(GetSplitsReq)                 returns (GetSplitsRes) {}
  // rpc SettleSplit(SettleSplitReq)             returns (Split) {}

  // Goals
  // rpc CreateGoal(CreateGoalReq)               returns (Goal) {}
  // rpc GetGoals(GetGoalsReq)                   returns (GetGoalsRes) {}
  // rpc ContributeToGoal(ContributeToGoalReq)   returns (Goal) {}
}

