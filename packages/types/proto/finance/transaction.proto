syntax = "proto3";

package finance;

import "paginate.proto";

enum TransactionType {
  INCOME  = 0;
  EXPENSE = 1;
}

enum TransactionSource {
  MANUAL    = 0;
  BANK      = 1;
  RECURRING = 2;
  OCR       = 3;
  SPLIT     = 4;
}

message Empty {}

message Category {
  string name  = 1;
  string slug  = 2;
  string color = 3;
  string icon  = 4;
}

message Bank {
  string bank_id        = 1;
  string bank_logo_url  = 2;
  string account_number = 3;
  string account_name   = 4;
}

// Lightweight split summary embedded inside a Transaction response.
// Not the same as the full Split message defined in split.proto.
message SplitRef {
  string id     = 1;
  string name   = 2;
  string amount = 3; // string — preserves decimals
  string status = 4;
}

message GoalContribution {
  string id          = 1;
  string amount      = 2; // string — preserves decimals
  string date        = 3;
  string description = 4;
  string notes       = 5;
}

message CreateTransactionReq {
  string            amount        = 1; // string e.g. "5000.50"
  string            date          = 2; // ISO string e.g. "2026-03-20"
  TransactionType   type          = 3;
  optional string   description   = 4;
  optional string   merchant      = 5;
  string            category_slug = 6;
  TransactionSource source        = 7;
 string   source_id     = 8;
}

message Transaction {
  string            id                       = 1;
  string            amount                   = 2; // string — preserves decimals
  string            date                     = 3;
  string           type                     = 4;
  string           source                   = 5;
  Category          category                 = 6;
  string            created_at               = 8;
  string            updated_at               = 9;
  optional string   merchant                 = 7;
  optional string   source_id                = 10;
  optional string   source_data              = 11;
  optional string   description              = 12;
  optional string   notes                    = 13;
  optional string   bank_transaction_id      = 14;
  optional string   bank_transaction_status  = 16;
  optional Bank     bank                     = 17;
  optional SplitRef split                    = 18;
  optional GoalContribution goal_contribution = 19;
}
message GetTransactionsReq {
  optional string           start_date          = 1;
  optional string           end_date            = 2;
  int32                     page                = 3;
  int32                     limit               = 4;
  repeated string           category_slug       = 5; // empty array = not filtered
  repeated TransactionType  type                = 6; // empty array = not filtered
  repeated TransactionSource source             = 7; // empty array = not filtered
  optional string           source_id           = 8;
  optional string           bank_transaction_id = 9;
  optional string           bank_account_id     = 10;
}

message GetTransactionsRes {
  repeated Transaction transactions = 1;
  PaginateResponse meta = 2;
}

message GetTransactionReq {
  string id = 1;
}

message UpdateTransactionReq {
  string id = 1;
  optional string amount = 2;
  optional string date = 3;
  optional TransactionType type = 4;
  optional string description = 5;
  optional string merchant = 6;
  optional string category_slug = 7;
}

message DeleteTransactionReq {
  string id = 1;
}


