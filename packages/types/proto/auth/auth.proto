syntax = "proto3";

package auth;

service AuthService {
    rpc Register(RegisterReq) returns (RegisterRes) {}
    rpc VerifyEmail(VerifyEmailReq) returns (VerifyEmailRes) {}
    rpc ResendVerifyEmailToken(ResendVerifyEmailTokenReq) returns (ResendVerifyEmailTokenRes) {}
    rpc Login(LoginReq) returns (LoginRes) {}
    rpc ForgotPassword(ForgotPasswordReq) returns (ForgotPasswordRes) {}
    rpc ResendForgotPasswordToken(ResendForgotPasswordTokenReq) returns (ResendForgotPasswordTokenRes) {}
    rpc VerifyPasswordToken(VerifyPasswordTokenReq) returns(VerifyPasswordTokenRes) {}
    rpc ResetPassword(ResetPasswordReq) returns(Empty) {}
    rpc ValidateToken(Empty) returns (ValidateTokenRes) {}
    rpc RefreshToken(Empty) returns (RefreshTokenRes) {}
    rpc LoginWithGoogle(LoginwithGoggleReq)  returns (LoginRes) {}
    rpc InitiateTwoFactorSetup(Empty) returns (InitiateTwoFactorSetupRes) {}
    rpc ConfirmTwoFactorSetup(ConfirmTwoFactorSetupReq) returns (ConfirmTwoFactorSetupRes) {}
    rpc DisableTwoFactor(DisableTwoFactorReq) returns (Empty) {}
    rpc VerifyTwoFactor(VerifyTwoFactorReq) returns (LoginRes) {}
    rpc ChangePassword(ChangePasswordReq) returns (Empty) {}
    rpc InitiateEmailChange(ChangeEmailReq) returns (InitiateEmailChangeRes) {}
    rpc VerifyEmailChange(VerifyEmailChangeReq) returns (Empty) {}
    rpc RegenerateBackupCodes(ConfirmTwoFactorSetupReq) returns (ConfirmTwoFactorSetupRes) {}
    rpc DeleteAccount(DeleteAccountReq) returns (Empty) {}
}

// ------- REUSABLE EMPTY INTERFACE ---------- //
message Empty {

}


// ------- AUTH INTERFACES ---------------//

message User {
    string id=1;
    string email= 2;
    optional string avatar= 3;
    string first_name= 4;
    string last_name= 5;
}

message RegisterReq {
    string email= 1;
    string password= 2;
    string first_name= 3;
    string last_name= 4;
}

message RegisterRes {
     User user= 1;
     string email_token= 2;
}

message VerifyEmailReq {
    string otp= 1;
    string device_id= 2;
    optional string user_agent= 3;
    optional string ip_address= 4;
    optional string location= 5;
}

message VerifyEmailRes {
    User user= 1;
    string access_token= 2;
    string refresh_token= 3;
}

message ResendVerifyEmailTokenReq {
    string email= 1;
}

message ResendVerifyEmailTokenRes {
    User user= 1;
    string email_token= 2;
}

message LoginReq {
 string email= 1;
 string password= 2;
 string device_id= 3;
 optional string user_agent= 4;
 optional string ip_address= 5;
 optional string location= 6;
}

message LoginRes {
    User user= 1;
    string access_token= 2;
    string refresh_token= 3;
    optional bool requires_two_factor = 4;
    optional string two_factor_token  = 5;
}

message ForgotPasswordReq {
    string email= 1;
}

message ForgotPasswordRes {
    string email= 1;
}

message ResendForgotPasswordTokenReq {
    string email= 1;
}

message ResendForgotPasswordTokenRes {
    string email= 1;
}

message VerifyPasswordTokenReq {
     string email= 1;
      string otp= 2;
}

message VerifyPasswordTokenRes {
    string password_token= 1;
}

message ResetPasswordReq {
      string new_password= 1;
}

message ValidateTokenRes {
    string id=1;
    string email= 2;
    string avatar= 3;
    string first_name= 4;
    string last_name= 5;
}

message RefreshTokenRes {
    string access_token= 2;
    string refresh_token= 3;
}

message LoginwithGoggleReq {
   string id_token= 1;
    string device_id= 2;
    optional string user_agent= 3;
    optional string ip_address= 4;
    optional string location= 5;
}

message InitiateTwoFactorSetupRes {
  string secret     = 1; // base32 — for manual entry in authenticator app -> Unencrypted at this stage
  string otpauth_uri = 2; // full otpauth://totp/... URI — render as QR code
}

message ConfirmTwoFactorSetupReq {
  string code   = 1; // 6-digit code from authenticator app — proves setup worked
}

message ConfirmTwoFactorSetupRes {
  repeated string backup_codes = 1; // 10 plain codes — shown ONCE, never stored plain
}

message DisableTwoFactorReq {
  string code   = 1; // requires current TOTP code — prevents unauthorised disable
}

message VerifyTwoFactorReq {
  string two_factor_token  = 1; // short-lived JWT returned by Login when 2FA required
  string code            = 2; // 6-digit TOTP or 8-char backup code
  string device_id        = 3;
  optional string user_agent  = 4;
  optional string ip_address  = 5;
  optional string location   = 6;
}

message ChangePasswordReq {
  optional string current_password = 1; // omitted when user has no password yet (social users)
  string new_password               = 2;
  optional string otp_code          = 3; // required when user has 2FA enabled — enforced server-side
}

message ChangeEmailReq {
  string new_email        = 1; // the new email address to change to
  string current_password = 2; // current password — verifies ownership before change
  optional string otp_code = 3; // required when user has 2FA enabled — enforced server-side
}

message InitiateEmailChangeRes {
  string new_email = 1; // the address the OTP was sent to
}

message VerifyEmailChangeReq {
  string otp = 1; // 6-digit code sent to the new email address
}

message DeleteAccountReq {
  optional string password = 1; // omit for social-only users (no password set)
  optional string otp_code = 2; // required when 2FA is enabled — enforced server-side
}
