syntax = "proto3";

package scheduler;

service SchedulerService {
    rpc CreateScheduler(CreateSchedulerReq) returns (CreateSchedulerRes) {}
}

message CreateSchedulerReq {
    string name = 1;
    string description = 2;
    string frequency = 3;
}

message CreateSchedulerRes {
    string id = 1;
    string name = 2;
    string description = 3;
    string frequency = 4;
}
