# =============================================================================
# FinTrack — CI / CD Pipeline
#
# Triggers & job matrix:
#   • push feat/**          → quality (type-check) + test
#   • pull_request → main   → quality (type-check) + test
#   • push main (merge)     → Render auto-deploys via Git integration
#
# Deployment is handled by Render natively (render.yaml Blueprint).
# No Docker build, no deploy hooks, no secrets needed here.
# =============================================================================

name: CI / CD

on:
  push:
    branches: [main, feat/**]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "9.0.0"

# ── Job 1: Type Check ─────────────────────────────────────────────────────────
jobs:
  quality:
    name: Type Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref != 'refs/heads/main')

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Build shared packages so workspace imports resolve during type-check.
      # DATABASE_URL is a placeholder — prisma generate reads schema only, no DB connection.
      - name: Build workspace packages
        run: pnpm turbo build --filter="./packages/*"
        env:
          SKIP_ENV_VALIDATION: "true"
          DATABASE_URL: "postgresql://user:pass@localhost/db"

      - name: Type check all apps
        run: pnpm check-types
        env:
          SKIP_ENV_VALIDATION: "true"

# ── Job 2: Unit Tests (one job per NestJS service) ────────────────────────────
  test:
    name: Test — ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref != 'refs/heads/main')

    strategy:
      fail-fast: false
      matrix:
        service:
          - api_gateway
          - auth_service
          - notification_service
          - payment_service

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace packages
        run: pnpm turbo build --filter="./packages/*"
        env:
          SKIP_ENV_VALIDATION: "true"
          DATABASE_URL: "postgresql://user:pass@localhost/db"

      - name: Run tests
        run: pnpm --filter ${{ matrix.service }} test
        env:
          NODE_ENV: test
