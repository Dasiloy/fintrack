# =============================================================================
# FinTrack — Production Compose (Backend only)
#
# Pulls pre-built images from Docker Hub (pushed by GitHub Actions CI/CD).
# Database (Neon) and Redis (Upstash) are external — no infra containers.
#
# Usage:
#   IMAGE_TAG=<git-sha> docker compose -f docker-compose.prod.yml up -d
#
# Required env vars — copy .env.example → .env and fill in real values,
# OR export them in the shell before running compose.
# =============================================================================

name: fintrack-prod

services:

  # ── API Gateway (HTTP :4001) ────────────────────────────────────────────────
  api_gateway:
    image: dasiloy/fintrack-api-gateway:${IMAGE_TAG:-latest}
    container_name: fintrack-api-gateway
    restart: unless-stopped
    ports:
      - "4001:4001"
    environment:
      NODE_ENV: production
      API_GATEWAY_PORT: 4001

      # gRPC client endpoints — use Docker service names as hostnames
      AUTH_SERVICE_HOST: auth_service
      AUTH_SERVICE_PORT: 4002
      PAYMENT_SERVICE_HOST: payment_service
      PAYMENT_SERVICE_PORT: 4008
      NOTIFICATION_SERVICE_HOST: notification_service
      NOTIFICATION_SERVICE_PORT: 4009

      # External services
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}

      # JWT
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_TOKEN_EXPIRATION: ${JWT_ACCESS_TOKEN_EXPIRATION}
      JWT_REFRESH_TOKEN_EXPIRATION: ${JWT_REFRESH_TOKEN_EXPIRATION}

      # NextAuth / OAuth
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_GOOGLE_ID: ${AUTH_GOOGLE_ID}
      AUTH_GOOGLE_SECRET: ${AUTH_GOOGLE_SECRET}

      # Swagger UI basic-auth
      SWAGGER_DOC_USER: ${SWAGGER_DOC_USER}
      SWAGGER_DOC_PASS: ${SWAGGER_DOC_PASS}

    depends_on:
      auth_service:
        condition: service_healthy
      payment_service:
        condition: service_healthy
      notification_service:
        condition: service_healthy
    networks:
      - fintrack-net
    healthcheck:
      # TCP check — port open means the HTTP server is ready
      test: ["CMD", "nc", "-z", "localhost", "4001"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s

  # ── Auth Service (gRPC :4002) ───────────────────────────────────────────────
  auth_service:
    image: dasiloy/fintrack-auth-service:${IMAGE_TAG:-latest}
    container_name: fintrack-auth-service
    restart: unless-stopped
    environment:
      NODE_ENV: production
      MICROSERVICE_NAME: AUTH_SERVICE
      # Bind on 0.0.0.0 so the gRPC server is reachable from other containers
      AUTH_SERVICE_HOST: 0.0.0.0
      AUTH_SERVICE_PORT: 4002

      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}

      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_OTP_SECRET: ${JWT_OTP_SECRET}
      JWT_ACCESS_TOKEN_EXPIRATION: ${JWT_ACCESS_TOKEN_EXPIRATION}
      JWT_REFRESH_TOKEN_EXPIRATION: ${JWT_REFRESH_TOKEN_EXPIRATION}
      JWT_OTP_TOKEN_EXPIRATION: ${JWT_OTP_TOKEN_EXPIRATION}
      OTP_EXPIRY_MINUTES: ${OTP_EXPIRY_MINUTES}
      MAX_LOGIN_ATTEMPTS: ${MAX_LOGIN_ATTEMPTS}

    networks:
      - fintrack-net
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "4002"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Notification Service (gRPC :4009 + BullMQ worker) ──────────────────────
  notification_service:
    image: dasiloy/fintrack-notification-service:${IMAGE_TAG:-latest}
    container_name: fintrack-notification-service
    restart: unless-stopped
    environment:
      NODE_ENV: production
      MICROSERVICE_NAME: NOTIFICATION_SERVICE
      NOTIFICATION_SERVICE_HOST: 0.0.0.0
      NOTIFICATION_SERVICE_PORT: 4009

      REDIS_URL: ${REDIS_URL}
      MAIL_FROM: ${MAIL_FROM}
      MAIL_TOKEN: ${MAIL_TOKEN}

    networks:
      - fintrack-net
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "4009"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Payment Service (gRPC :4008) ────────────────────────────────────────────
  payment_service:
    image: dasiloy/fintrack-payment-service:${IMAGE_TAG:-latest}
    container_name: fintrack-payment-service
    restart: unless-stopped
    environment:
      NODE_ENV: production
      MICROSERVICE_NAME: PAYMENT_SERVICE
      PAYMENT_SERVICE_HOST: 0.0.0.0
      PAYMENT_SERVICE_PORT: 4008

      DATABASE_URL: ${DATABASE_URL}

    networks:
      - fintrack-net
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "4008"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  fintrack-net:
    driver: bridge
